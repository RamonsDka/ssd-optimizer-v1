# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: Vite 6 + React 19 + TypeScript 5.8 (migrating to Next.js 15)
  UI: Tailwind CSS 4 + lucide-react + motion (Framer Motion)
  Routing: React Router 7
  Backend: Express + Gemini AI (@google/genai)
  Architecture: Component-based, path aliases (@/*), no test infrastructure yet
  Style: TypeScript strict mode, no linter/formatter configured

strict_tdd: false

testing:
  runner:
    available: false
    framework: null
    command: null
  layers:
    unit:
      available: false
      tool: null
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: false
      command: null
    type_checker:
      available: true
      command: "tsc --noEmit"
    formatter:
      available: false
      command: null

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Consider Next.js 15 migration path in all designs
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load react-dev skill for React 19 patterns
    - Use TypeScript strict typing
    - Prefer functional components with hooks
  verify:
    - Run type checking with tsc --noEmit
    - Manual verification until test infrastructure is added
  archive:
    - Warn before merging destructive deltas (large removals)
