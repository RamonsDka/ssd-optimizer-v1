version: "3.9"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sdd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdd_user
      POSTGRES_PASSWORD: sdd_password
      POSTGRES_DB: sdd_optimizer
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdd_user -d sdd_optimizer"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sdd_net

  # ─── Next.js Application ───────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sdd_optimizer_app
    restart: unless-stopped
    # App is exposed through nginx on port 8081
    environment:
      - DATABASE_URL=postgresql://sdd_user:sdd_password@postgres:5432/sdd_optimizer?schema=public
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:8081}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/settings || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sdd_net

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  # Exposed on port 8081 as per design spec.
  nginx:
    image: nginx:alpine
    container_name: sdd_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - sdd_net

volumes:
  postgres_data:
    driver: local

networks:
  sdd_net:
    driver: bridge
